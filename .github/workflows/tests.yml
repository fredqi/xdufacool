name: Unit Tests

on:
  push:
    paths:
      - 'pyproject.toml'
      - 'environment.yml'
      - 'xdufacool/**'
      - 'tests/**'

jobs:
  testing:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ['3.12']

    env:
      LOG_FILE: venv-py${{ matrix.python }}.log

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python }}

    - name: Install package
      run: |
        python -m venv venv
        source venv/bin/activate
        pip install --upgrade pip
        pip install .[dev]

    - name: Unit Tests
      run: |
        python3 -m unittest discover -v > ${{ env.LOG_FILE }}
      
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.LOG_FILE }}
        path: ${{ env.LOG_FILE }}

  mamba-testing:
    runs-on: ubuntu-latest

    env:
      LOG_FILE: mamba-py3.12.log

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up conda/mamba
      uses: conda-incubator/setup-miniconda@v3
      with:
        activate-environment: xdufacool
        auto-update-conda: false
        channels: conda-forge
        environment-file: environment.yml
        use-mamba: true

    - name: Install package (mamba)
      shell: bash -el {0}
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]

    - name: Unit Tests (mamba)
      shell: bash -el {0}
      run: |
        python -m pytest tests -q > ${{ env.LOG_FILE }}

    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.LOG_FILE }}
        path: ${{ env.LOG_FILE }}

  slack:
    runs-on: ubuntu-latest
    name: Notification
    if: always()
    needs:
      - testing
      - mamba-testing

    env:
      REPO_NAME: ${{ github.event.repository.name }}
      VENV_RESULT: ${{ needs.testing.result }}
      MAMBA_RESULT: ${{ needs.mamba-testing.result }}
    
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: logs

    - name: Collect logs
      id: message
      run: |
        LOGS=$(find logs -mindepth 1 -maxdepth 1 -type d | sed -e 's|logs/||' -e 's/^/:white_check_mark: /' | sort)
        MESSAGE="venv job: ${VENV_RESULT}\nmamba job: ${MAMBA_RESULT}\n${LOGS}"
        echo "message<<EOF" >> $GITHUB_OUTPUT
        echo "${MESSAGE}" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Slack Notification
      uses: rtCamp/action-slack-notify@master
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        SLACK_ICON_EMOJI: ':mailbox:'
        SLACK_CHANNEL: teaching
        SLACK_COLOR: 'success'
        SLACK_USERNAME: GitHub Action Bot
        SLACK_TITLE: "${{ env.REPO_NAME }} Unit Tests"
        SLACK_MESSAGE: "${{ steps.message.outputs.message }}"
        SLACK_FOOTER: 'triggered by ${{ github.sha }}'
        MSG_MINIMAL: true
        
